<div class="page-container">
  <div class="page-header">
    <h2>Créer une séance</h2>
  </div>

  <div class="form-card">
    <div *ngIf="error" class="error">{{ error }}</div>

    <div class="form-group">
      <label>Matière</label>
      <input type="text" [(ngModel)]="form.subject" placeholder="Ex: Java et Sécurité" />
    </div>

    <div class="form-group">
      <label>ID Professeur</label>
      <input type="number" [(ngModel)]="form.teacherId" min="1" />
    </div>

    <div class="form-group">
      <label>Durée (minutes)</label>
      <input type="number" [(ngModel)]="form.durationMinutes" min="15" max="300" />
    </div>

    <div class="form-actions">
      <button class="btn-secondary" (click)="cancel()">Annuler</button>
      <button class="btn-primary" (click)="submit()" [disabled]="loading">
        {{ loading ? 'Création...' : 'Créer la séance' }}
      </button>
    </div>
  </div>
</div>
