<div class="stat-card" [style.border-left-color]="color">
  <div class="stat-card-icon" [style.background]="color + '1a'">
    <span>{{ icon }}</span>
  </div>
  <div class="stat-card-content">
    <div class="stat-card-value">{{ value }}</div>
    <div class="stat-card-title">{{ title }}</div>
  </div>
</div>
