spring.application.name=systeme_absence

# ==========================================
# MySQL Configuration
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/systeme_absence?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# Multipart (upload image)
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# AI API URL
# ==========================================
ai.api.url=http://localhost:8000

# Port Spring Boot
server.port=8081

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=3f8a2b1c9d4e7f6a0b5c8d2e1f4a7b3c9d6e2f5a8b1c4d7e0f3a6b9c2d5e8f1a
jwt.expiration=86400000
